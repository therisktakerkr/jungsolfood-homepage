<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>정솔푸드 | 취급 품목표</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
    :root{
      --green:#184b36;--green2:#2f6048;--green-light:#eaf3ee;
      --ink:#111817;--muted:#66746f;--line:#dbe7df;--cream:#fbfaf6;--white:#fff;
      --shadow:0 8px 32px rgba(24,75,54,.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Pretendard",-apple-system,sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.6}
    a{text-decoration:none;color:inherit}
    .loading{position:fixed;inset:0;background:rgba(251,250,246,.85);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
    .loading-spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
    .loading-text{font-size:14px;color:var(--muted);font-weight:600}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Header */
    .header{position:sticky;top:0;z-index:50;background:rgba(251,250,246,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:0 24px}
    .header-inner{max-width:1200px;margin:0 auto;height:72px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:relative}
    .desk-nav{display:flex;align-items:center;gap:24px;font-size:15px;font-weight:500;color:#24322f;position:absolute;left:50%;transform:translateX(-50%)}
    .desk-nav a{transition:.2s;white-space:nowrap}.desk-nav a:hover,.desk-nav a.active{color:var(--green);font-weight:700}
    .hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:40px;height:40px;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px}.hamburger span{display:block;width:22px;height:2px;background:var(--green);border-radius:2px;transition:.3s;transform-origin:center}.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}.hamburger.open span:nth-child(2){opacity:0}.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .mobile-nav{display:none;position:fixed;inset:0;top:72px;z-index:49;background:rgba(251,250,246,.97);backdrop-filter:blur(20px);flex-direction:column;padding:24px;gap:0;border-top:1px solid var(--line)}.mobile-nav.open{display:flex}.mobile-nav a{font-size:18px;font-weight:600;color:var(--ink);padding:16px 0;border-bottom:1px solid var(--line);transition:.2s}.mobile-nav a:hover,.mobile-nav a.active{color:var(--green)}
    @media(max-width:900px){.desk-nav{display:none}.hamburger{display:flex}.btn{height:36px;padding:0 12px;font-size:12px}.header-inner .brand img{height:36px}}
    .brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--green)}
    .brand-sub{font-size:13px;font-weight:500;color:var(--muted);border-left:1px solid var(--line);padding-left:10px;margin-left:2px}
    .header-actions{display:flex;gap:10px;align-items:center}
    .btn{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--green);transition:.2s;background:transparent;color:var(--green);font-family:inherit}
    .btn:hover{background:var(--green-light)}
    .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
    .btn.primary:hover{background:var(--green2)}
    .btn-back{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
    .btn-back:hover{color:var(--green)}

    /* Page */
    .page{max-width:1200px;margin:0 auto;padding:40px 24px 80px}
    .page-head{margin-bottom:32px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .page-title{font-size:28px;font-weight:700;color:var(--green);letter-spacing:-.05em}
    .page-date{font-size:13px;color:var(--muted)}
    .eyebrow{font-size:11px;font-weight:700;letter-spacing:.4em;color:var(--green);margin-bottom:10px}

    /* Category blocks */
    .category-block{margin-bottom:48px}
    .category-title{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--green)}
    .category-name{font-size:18px;font-weight:700;color:var(--green)}
    .category-count{font-size:12px;font-weight:600;color:var(--white);background:var(--green);border-radius:999px;padding:2px 10px}

    /* Table */
    .tbl-wrap{overflow-x:auto;border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;background:var(--white);font-size:14px}
    thead tr{background:var(--green)}
    thead th{padding:13px 16px;text-align:left;font-size:12px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.9);white-space:nowrap}
    tbody tr{border-bottom:1px solid var(--line);transition:background .15s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#f4f9f6}
    tbody td{padding:12px 16px;color:var(--ink);vertical-align:middle;white-space:nowrap}
    .sub-cat{color:var(--green2);font-weight:600;font-size:13px}
    .tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.04em}
    .tag-vp{background:#e8f4ec;color:#1a6b3a}
    .tag-bulk{background:#fff3e0;color:#b45309}
    .tag-a{background:#e8f0fe;color:#1a56db}
    .tag-pr{background:#fce7f3;color:#9d174d}
    .badge-incoming{font-size:11px;color:#b45309;background:#fff3e0;border-radius:4px;padding:2px 7px;font-weight:600}
    .badge-incoming-june{font-size:11px;color:#1a56db;background:#e8f0fe;border-radius:4px;padding:2px 7px;font-weight:600}
    .text-muted{color:var(--muted);font-size:13px}

    /* Edit mode */
    .edit-indicator{display:none;align-items:center;gap:8px;background:#fff8e6;border:1px solid #f59e0b;border-radius:8px;padding:10px 16px;margin-bottom:20px;font-size:13px;color:#92400e;font-weight:600}
    .edit-indicator.show{display:flex}
    body.edit-mode .edit-cell{cursor:pointer;position:relative}
    body.edit-mode .edit-cell:hover{background:rgba(24,75,54,.06);border-radius:4px}
    body.edit-mode tbody tr:hover{background:#f0faf4}
    .edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
    .edit-overlay.show{display:flex}
    .edit-modal{background:#fff;border-radius:16px;padding:32px;width:min(520px,92vw);box-shadow:0 24px 80px rgba(0,0,0,.18)}
    .edit-modal h3{font-size:18px;font-weight:700;color:var(--green);margin-bottom:20px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group.full{grid-column:1/-1}
    .form-group label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em}
    .form-group input,.form-group select{height:40px;padding:0 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:.2s}
    .form-group input:focus,.form-group select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(24,75,54,.1)}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end}
    .btn-delete{margin-right:auto;background:none;border:1px solid #fca5a5;color:#dc2626;border-radius:8px;height:40px;padding:0 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
    .btn-delete:hover{background:#fef2f2}
    .btn-cancel{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;height:40px;padding:0 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-save{background:var(--green);color:#fff;border:none;border-radius:8px;height:40px;padding:0 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
    .btn-save:hover{background:var(--green2)}
    .add-row-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;background:none;border:1px dashed var(--line);border-top:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;border-radius:0 0 14px 14px}
    .add-row-btn:hover{background:var(--green-light);color:var(--green)}

    /* Footer */
    .page-footer{margin-top:48px;padding:28px 0;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .contact-info{display:flex;gap:24px;flex-wrap:wrap}
    .contact-item{font-size:13px;color:var(--muted)}
    .contact-item b{color:var(--green);margin-right:4px}

    @media(max-width:900px){
      .header-inner nav{display:none}
      .header-inner .brand img{height:36px}
    }
    @media(max-width:700px){
      .page-head{flex-direction:column;align-items:flex-start}
      .form-grid{grid-template-columns:1fr}
      .form-group.full{grid-column:1}
      .contact-info{flex-direction:column;gap:8px}
    }
  </style>
</head>

<script>
// 품목 데이터
const API_URL = 'https://script.google.com/macros/s/AKfycbxKYkP-diOSh9AkSlhCouF-tcHku_IZmB5uOZOZ221ub4s_ttq0bXzRk3RqTVuB0mW8Vw/exec';

let data = { pork: [], majang: [] };
let editMode = false;
let editTarget = null;
let addTarget = null;

// 로딩 상태 표시
function setLoading(show) {
  document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

// Google Sheets에서 데이터 불러오기 (JSONP 방식)
function loadData() {
  setLoading(true);

  const cbName = '_cb' + Date.now();
  window[cbName] = function(json) {
    data = json;
    renderAll();
    setLoading(false);
    delete window[cbName];
    const s = document.getElementById('_jsonp');
    if (s) s.remove();
  };

  const script = document.createElement('script');
  script.id = '_jsonp';
  script.onerror = function() {
    setLoading(false);
    alert('데이터를 불러오는데 실패했습니다. 잠시 후 다시 시도해주세요.');
    this.remove();
  };
  script.src = API_URL + '?callback=' + cbName;
  document.head.appendChild(script);
}

// Google Sheets에 데이터 저장 (no-cors)
async function saveToSheet() {
  setLoading(true);
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify(data),
    });
  } catch(e) {
    console.error(e);
  } finally {
    setLoading(false);
  }
}

function packTag(pack) {
  const map = {VP:'tag-vp', BULK:'tag-bulk', A:'tag-a', PR:'tag-pr'};
  return `<span class="tag ${map[pack]||'tag-vp'}">${pack}</span>`;
}

function noteTag(note) {
  if (!note) return '';
  if (note.includes('6월')) return `<span class="badge-incoming-june">${note}</span>`;
  if (note.includes('입항')) return `<span class="badge-incoming">${note}</span>`;
  return `<span class="text-muted">${note}</span>`;
}

function renderTable(section) {
  const tbody = document.getElementById(section+'-body');
  const rows = data[section];
  tbody.innerHTML = rows.map((r,i) => `
    <tr>
      <td class="sub-cat edit-cell" data-sec="${section}" data-idx="${i}" data-field="item">${r.item||'-'}</td>
      <td class="edit-cell" data-sec="${section}" data-idx="${i}" data-field="brand">${r.brand||'-'}</td>
      <td class="edit-cell" data-sec="${section}" data-idx="${i}" data-field="origin">${r.origin||'-'}</td>
      <td class="edit-cell" data-sec="${section}" data-idx="${i}" data-field="pack">${packTag(r.pack)}</td>
      <td class="edit-cell" data-sec="${section}" data-idx="${i}" data-field="storage">${r.storage||'-'}</td>
      <td class="edit-cell" data-sec="${section}" data-idx="${i}" data-field="own">${r.own||'-'}</td>
      <td class="edit-cell" data-sec="${section}" data-idx="${i}" data-field="note">${noteTag(r.note)}</td>
    </tr>
  `).join('');

  // 클릭 이벤트
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => {
      if (!editMode) return;
      const idx = parseInt(tr.querySelector('.edit-cell').dataset.idx);
      openEdit(section, idx);
    });
  });

  // 카운트 업데이트
  document.getElementById(section+'-count').textContent = rows.length + '개';
}

function renderAll() {
  renderTable('pork');
  renderTable('majang');
}

function toggleMenu(){const h=document.getElementById('hamburger');const n=document.getElementById('mobileNav');h.classList.toggle('open');n.classList.toggle('open');document.body.style.overflow=n.classList.contains('open')?'hidden':'';}
function closeMenu(){document.getElementById('hamburger').classList.remove('open');document.getElementById('mobileNav').classList.remove('open');document.body.style.overflow='';}

function promptEdit() {
  if (editMode) {
    toggleEdit();
    return;
  }
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pwOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function checkPw() {
  const pw = document.getElementById('pw-input').value;
  if (pw === '4002') {
    document.getElementById('pwOverlay').style.display = 'none';
    toggleEdit();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function closePwModal(e) {
  if (e && e.target !== document.getElementById('pwOverlay')) return;
  document.getElementById('pwOverlay').style.display = 'none';
}

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('editIndicator').classList.toggle('show', editMode);
  document.getElementById('editBtn').textContent = editMode ? '✅ 편집 완료' : '✏️ 편집 모드';
  document.getElementById('pork-add').style.display = editMode ? 'flex' : 'none';
  document.getElementById('majang-add').style.display = editMode ? 'flex' : 'none';
}

function openEdit(section, idx) {
  editTarget = {section, idx};
  addTarget = null;
  const r = data[section][idx];
  document.getElementById('modalTitle').textContent = '품목 수정';
  document.getElementById('f-item').value = r.item;
  document.getElementById('f-brand').value = r.brand;
  document.getElementById('f-origin').value = r.origin;
  document.getElementById('f-pack').value = r.pack;
  document.getElementById('f-storage').value = r.storage;
  document.getElementById('f-own').value = r.own;
  document.getElementById('f-note').value = r.note;
  document.getElementById('deleteBtn').style.display = 'inline-flex';
  document.getElementById('editOverlay').classList.add('show');
}

function openAdd(section) {
  addTarget = section;
  editTarget = null;
  document.getElementById('modalTitle').textContent = '품목 추가';
  document.getElementById('f-item').value = '';
  document.getElementById('f-brand').value = '';
  document.getElementById('f-origin').value = '';
  document.getElementById('f-pack').value = 'VP';
  document.getElementById('f-storage').value = '';
  document.getElementById('f-own').value = '마장동';
  document.getElementById('f-note').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('editOverlay').classList.add('show');
}

function saveRow() {
  const r = {
    item: document.getElementById('f-item').value,
    brand: document.getElementById('f-brand').value,
    origin: document.getElementById('f-origin').value,
    pack: document.getElementById('f-pack').value,
    storage: document.getElementById('f-storage').value,
    own: document.getElementById('f-own').value,
    note: document.getElementById('f-note').value,
  };
  if (editTarget) {
    data[editTarget.section][editTarget.idx] = r;
    renderTable(editTarget.section);
  } else if (addTarget) {
    data[addTarget].push(r);
    renderTable(addTarget);
  }
  closeModal();
  saveToSheet();
}

function deleteRow() {
  if (!editTarget) return;
  if (!confirm('이 항목을 삭제할까요?')) return;
  data[editTarget.section].splice(editTarget.idx, 1);
  renderTable(editTarget.section);
  closeModal();
  saveToSheet();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('editOverlay')) return;
  document.getElementById('editOverlay').classList.remove('show');
  editTarget = null;
  addTarget = null;
}

function printPage() {
  window.print();
}

// 날짜
const d = new Date();
document.getElementById('updateDate').textContent =
  `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 기준`;

// 시작 시 Google Sheets에서 데이터 로드
loadData();
